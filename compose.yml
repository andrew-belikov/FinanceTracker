# compose.yml (project root)
# Запуск из корня проекта:
#   docker compose up -d --build

services:
  db:
    image: postgres:16
    container_name: financetracker-db-1
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - fintracker-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  xray-client:
    build:
      context: .
      dockerfile: docker/Dockerfile.xray-client
    image: financetracker-xray-client
    container_name: financetracker-xray-client-1
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SERVICE: xray_client
      BOT_PROXY_ENABLED: ${BOT_PROXY_ENABLED:-false}
      BOT_VLESS_URL: ${BOT_VLESS_URL:-}
      BOT_VLESS_FALLBACK_URL: ${BOT_VLESS_FALLBACK_URL:-}
      XRAY_HEALTHCHECK_URL: https://api.ipify.org
      XRAY_LOCAL_PROXY_PORT: "1080"
    expose:
      - "1080"
    healthcheck:
      test: ["CMD", "python", "-u", "-m", "xray_client.healthcheck"]
      interval: 10s
      timeout: 15s
      retries: 6
      start_period: 10s
    restart: on-failure

  tracker:
    build:
      context: .
      dockerfile: docker/Dockerfile.tracker
    image: financetracker-tracker
    container_name: financetracker-tracker-1
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SERVICE: ${APP_SERVICE_TRACKER:-iis_tracker}
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./docker/certs:/opt/finance/certs:ro
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.bot
    image: financetracker-bot
    container_name: financetracker-bot-1
    depends_on:
      db:
        condition: service_healthy
      xray-client:
        condition: service_started
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SERVICE: ${APP_SERVICE_BOT:-iis_tracker_bot}
      TZ: ${TIMEZONE:-Europe/Moscow}
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REPORTER_INTERNAL_URL: ${REPORTER_INTERNAL_URL:-http://reporter:8088}
      REPORTER_REQUEST_TIMEOUT_SECONDS: ${REPORTER_REQUEST_TIMEOUT_SECONDS:-180}
      BOT_PROXY_ENABLED: ${BOT_PROXY_ENABLED:-false}
      BOT_PROXY_ENDPOINT: socks5h://xray-client:1080
      BOT_PROXY_NO_PROXY: localhost,127.0.0.1,db,tracker,xray-client
    restart: unless-stopped

  reporter:
    build:
      context: .
      dockerfile: docker/Dockerfile.reporter
    image: financetracker-reporter
    container_name: financetracker-reporter-1
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SERVICE: ${APP_SERVICE_REPORTER:-iis_tracker_reporter}
      TZ: ${TIMEZONE:-Europe/Moscow}
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REPORTER_HOST: 0.0.0.0
      REPORTER_PORT: ${REPORTER_PORT:-8088}
      REPORTER_MAX_BODY_BYTES: ${REPORTER_MAX_BODY_BYTES:-65536}
      REPORTER_INTERNAL_URL: ${REPORTER_INTERNAL_URL:-http://reporter:8088}
      REPORT_PDF_ENGINE: ${REPORT_PDF_ENGINE:-weasyprint}
      REPORT_DEBUG_SAVE_HTML: ${REPORT_DEBUG_SAVE_HTML:-false}
      REPORT_DEBUG_SAVE_PAYLOAD: ${REPORT_DEBUG_SAVE_PAYLOAD:-false}
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-false}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:1.5b}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-60}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-10m}
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-8192}
      OLLAMA_MAX_INPUT_CHARS: ${OLLAMA_MAX_INPUT_CHARS:-12000}
    expose:
      - "${REPORTER_PORT:-8088}"
    healthcheck:
      test: ["CMD", "python", "-u", "report_entrypoint.py", "--healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s
    networks:
      - default
      - localllm_localllm
    restart: unless-stopped

volumes:
  fintracker-db:
    external: true
    name: financetracker_fintracker-db

networks:
  localllm_localllm:
    external: true
    name: localllm_localllm
