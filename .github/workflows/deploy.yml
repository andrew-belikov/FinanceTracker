name: Deploy FinanceTracker

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      mode:
        description: Deployment mode
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - deploy
      ref:
        description: Git ref to deploy from canonical server checkout
        required: true
        default: main
        type: string

jobs:
  deploy:
    concurrency:
      group: financetracker-deploy
      cancel-in-progress: false

    runs-on:
      - self-hosted
      - linux
      - x64
      - homeserver
      - financetracker

    env:
      PROJECT_DIR: /home/andrey/projects/FinanceTracker
      DEPLOY_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'deploy' }}
      DEPLOY_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}

    steps:
      - name: Show runner context
        run: |
          whoami
          hostname
          pwd

      - name: Verify canonical project directory
        run: |
          test -d "$PROJECT_DIR"
          ls -la "$PROJECT_DIR"

      - name: Show repository context
        run: |
          cd "$PROJECT_DIR"
          git remote -v
          git branch --show-current
          git status --short

      - name: Update canonical checkout
        run: |
          cd "$PROJECT_DIR"
          git fetch origin
          git checkout "$DEPLOY_REF"
          git pull --ff-only origin "$DEPLOY_REF"

      - name: Run pre-deploy checks
        run: |
          cd "$PROJECT_DIR"
          python3 -m compileall src
          docker compose config > /dev/null
          docker compose ps

      - name: Apply deploy
        if: ${{ env.DEPLOY_MODE == 'deploy' }}
        run: |
          cd "$PROJECT_DIR"
          docker compose up -d --build --force-recreate --remove-orphans

      - name: Show post-deploy status
        if: ${{ env.DEPLOY_MODE == 'deploy' }}
        run: |
          cd "$PROJECT_DIR"
          docker compose ps
          docker compose logs --tail=200 bot tracker reporter
